<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ report_title }}</title>
  <style>
    :root {
      --page-width: 1100px;
      --border: #d7dee7;
      --ink: #1f1f1f;
      --muted: #56697d;
      --panel: #f5f8fb;
      --accent: #1b4f72;
    }
    body {
      font-family: "Noto Serif", Georgia, serif;
      line-height: 1.7;
      color: var(--ink);
      margin: 0;
      background: #eef3f7;
    }
    .page {
      max-width: var(--page-width);
      margin: 32px auto;
      background: #ffffff;
      padding: 40px 48px 56px;
      box-shadow: 0 16px 40px rgba(22, 37, 56, 0.08);
    }
    h1, h2, h3 {
      color: var(--accent);
      line-height: 1.3;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 20px;
    }
    h2 {
      font-size: 22px;
      margin: 36px 0 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    h3 {
      font-size: 18px;
      margin: 24px 0 10px;
    }
    p {
      margin: 10px 0;
    }
    ul {
      margin: 10px 0 14px 20px;
      padding: 0;
    }
    li {
      margin: 6px 0;
    }
    .meta {
      padding: 14px 18px;
      background: var(--panel);
      border-left: 4px solid #5c89b0;
      margin-bottom: 28px;
    }
    figure {
      margin: 20px auto 28px;
      padding: 14px;
      border: 1px solid var(--border);
      background: #fafcfe;
      max-width: 980px;
    }
    img {
      display: block;
      width: auto;
      max-width: min(100%, 960px);
      max-height: 560px;
      height: auto;
      margin: 0 auto;
      object-fit: contain;
    }
    figcaption {
      margin-top: 10px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    code {
      background: #eef3f7;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.95em;
    }
    a {
      color: #18507a;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>{{ report_title }}</h1>
    <div class="meta">
      <div><strong>Project Path:</strong> {{ project_path }}</div>
      <div><strong>Report Mode:</strong> {{ report_mode }}</div>
      <div><strong>Report Goal:</strong> {{ report_goal }}</div>
    </div>

    {{ body_html }}
  </div>
</body>
</html>
